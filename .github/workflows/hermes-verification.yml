name: Hermes provider verification

on:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/hermes-verification.py'
      - '.github/workflows/hermes-verification.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip

      - name: Validate script compiles
        run: python -m py_compile scripts/hermes-verification.py

      - name: Run verification script
        run: python3 scripts/hermes-verification.py --check-fallbacks
        env:
          # In GitHub Actions there is no Hermes CLI; the script still produces
          # output and exits cleanly. In the agent runtime it will produce
          # actual provider latency results. This is a dry-run artifact that
          # becomes meaningful when Hermes is present.
          HERMES_VERIFY_DRY_RUN: "false"

      - name: Upload verification artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hermes-verification-report
          path: reports/provider-usage/latest-hermes-verification.*
