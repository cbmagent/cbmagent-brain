repo: cbmagent/cbmagent-brain
operating_model: issue_branch_pr_review_merge
selection_rules:
  - prefer priority:critical issues that are not human-needed and not blocked
  - prefer read-only automation before write-gated automation
  - create/update repo artifacts through PRs
  - create human-needed issues instead of blocking silently
  - never print or commit credentials
  - keep per-site work in each site repo once it exists
